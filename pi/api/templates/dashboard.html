{% extends "base.html" %}
{% block title %}Dashboard — PLC Manager{% endblock %}

{% block content %}
<div x-data="dashboard()" x-init="init()">

    <div class="page-header">
        <h1>Dashboard</h1>
        <span class="live-badge" x-show="connected">● Live</span>
    </div>

    <div class="plc-grid">
        <template x-if="plcs.length === 0">
            <p class="empty-state">No PLCs registered yet. Connect a PLC to see it here.</p>
        </template>

        <template x-for="plc in plcs" :key="plc.plc_id">
            <div class="card plc-card" :class="cardClass(plc)">
                <div class="plc-card-header">
                    <span class="status-dot" :class="plc.status"></span>
                    <h2 x-text="plc.plc_id"></h2>
                    <span class="state-badge" :class="'state-' + plc.state" x-text="plc.state || '—'"></span>
                    <button class="btn-icon" title="Edit config" style="font-size:14px;margin-left:auto"
                            @click="startEdit(plc)">✎</button>
                </div>

                <!-- Read-only meta -->
                <div x-show="!editMode[plc.plc_id]">
                    <div class="plc-meta">
                        <span class="meta-label">Machine</span>
                        <span x-text="plc.machine_id || '—'"></span>
                    </div>
                    <div class="plc-meta">
                        <span class="meta-label">Part</span>
                        <span x-text="plc.part_num || '—'"></span>
                    </div>
                    <div class="plc-meta">
                        <span class="meta-label">Sequence</span>
                        <span x-text="plc.seq || '—'"></span>
                    </div>
                    <div class="plc-meta">
                        <span class="meta-label">Last seen</span>
                        <span x-text="formatAge(plc.hb_age_s)"></span>
                    </div>
                </div>

                <!-- Inline edit form -->
                <template x-if="editMode[plc.plc_id]">
                    <div class="plc-edit-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Machine ID</label>
                                <input type="text" x-model="editBuf[plc.plc_id].machine_id" placeholder="M001">
                            </div>
                            <div class="form-group">
                                <label>Part Number</label>
                                <input type="text" x-model="editBuf[plc.plc_id].part_num" placeholder="PN-000001">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <input type="text" x-model="editBuf[plc.plc_id].description" placeholder="Optional note">
                        </div>
                        <div class="plc-edit-actions">
                            <button class="btn btn-sm btn-primary" @click="saveConfig(plc.plc_id)">Save</button>
                            <button class="btn btn-sm btn-secondary" @click="editMode[plc.plc_id] = false">Cancel</button>
                        </div>
                    </div>
                </template>

                <div class="plc-card-footer" x-show="!editMode[plc.plc_id]">
                    <span class="fault-badge" x-show="plc.fault">FAULT</span>
                    <span class="text-muted" style="font-size:12px" x-show="plc.description" x-text="plc.description"></span>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
function dashboard() {
    return {
        plcs:      [],
        connected: false,
        editMode:  {},
        editBuf:   {},

        init() {
            fetch('/api/plcs')
                .then(r => r.json())
                .then(d => { this.plcs = d; });

            const es = new EventSource('/events');
            es.onmessage = e => {
                this.plcs      = JSON.parse(e.data);
                this.connected = true;
            };
            es.onerror = () => { this.connected = false; };
        },

        startEdit(plc) {
            this.editBuf[plc.plc_id] = {
                machine_id:  plc.machine_id  || '',
                part_num:    plc.part_num    || '',
                description: plc.description || '',
            };
            this.editMode[plc.plc_id] = true;
        },

        async saveConfig(plcId) {
            const buf = this.editBuf[plcId];
            const r = await fetch(`/api/plcs/${plcId}/config`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    machine_id:  buf.machine_id,
                    part_num:    buf.part_num,
                    description: buf.description,
                }),
            });
            if (r.ok) {
                this.editMode[plcId] = false;
            }
        },

        cardClass(plc) {
            if (plc.fault || plc.state === 'FAULT') return 'fault';
            if (plc.status === 'online') return 'online';
            if (plc.status === 'stale')  return 'stale';
            return 'offline';
        },

        formatAge(s) {
            if (s === null || s === undefined) return 'Never';
            if (s < 60)  return `${Math.round(s)}s ago`;
            if (s < 3600) return `${Math.round(s / 60)}m ago`;
            return `${Math.round(s / 3600)}h ago`;
        },
    };
}
</script>
{% endblock %}
